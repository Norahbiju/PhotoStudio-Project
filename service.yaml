apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: photostudio
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: photostudio-service
  namespace: photostudio
spec:
  type: NodePort
  selector:
    app: photostudio
  ports:
    - port: 3000
      targetPort: 3000   # change if your app uses different port
      nodePort: 30007
